function transformarLinks(texto) {
  const urlRegex = /(https?:\/\/[^\s]+)/g;

  return texto.replace(urlRegex, function(url) {
    return `<a href="${url}" target="_blank" style="
    color:#CBD1FF; 
   -1px -1px 0 #000,
    1px -1px 0 #000,
   -1px  1px 0 #000,
    1px  1px 0 #000;
   
    ">${url}</a>`;
  });
}                    //kafka = #9E377D

function embaralhar(array){
  for(let i=array.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
}

if(memoriaCartas[a.index]===memoriaCartas[b.index]){

function mostrarTabuleiro() {

  let t = tabuleiro.map((v, i) => v === "" ? (i+1).toString() : v);

  let linha1 = t[0] + " | " + t[1] + " | " + t[2];
  let linha2 = t[3] + " | " + t[4] + " | " + t[5];
  let linha3 = t[6] + " | " + t[7] + " | " + t[8];

  digitarEEnviar(linha1, 300);
  digitarEEnviar("────────────", 200);
  setTimeout(() => digitarEEnviar(linha2, 600), 400);
  setTimeout(() => digitarEEnviar(linha3, 900), 800);
}

function verificarVitoria(simbolo) {
  const combinacoes = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  return combinacoes.some(c =>
    tabuleiro[c[0]] === simbolo &&
    tabuleiro[c[1]] === simbolo &&
    tabuleiro[c[2]] === simbolo
  );
}

function jogadaIA() {

  // Primeiro, tenta vencer
  for (let i = 0; i < 9; i++) {
    if (tabuleiro[i] === "") {
      tabuleiro[i] = "⭕";
      if (verificarVitoria("⭕")) return;
      tabuleiro[i] = "";
    }
  }

  // Depois, bloqueia o jogador
  for (let i = 0; i < 9; i++) {
    if (tabuleiro[i] === "") {
      tabuleiro[i] = "❌";
      if (verificarVitoria("❌")) {
        tabuleiro[i] = "⭕"; // bloqueia
        return;
      }
      tabuleiro[i] = "";
    }
  }

  // Se centro livre, pega o centro
  if (tabuleiro[4] === "") {
    tabuleiro[4] = "⭕";
    return;
  }

  // Se cantos livres, pega um canto aleatório
  const cantos = [0, 2, 6, 8].filter(i => tabuleiro[i] === "");
  if (cantos.length > 0) {
    const escolha = cantos[Math.floor(Math.random() * cantos.length)];
    tabuleiro[escolha] = "⭕";
    return;
  }

  // Qualquer lateral livre
  const lados = [1, 3, 5, 7].filter(i => tabuleiro[i] === "");
  if (lados.length > 0) {
    const escolha = lados[Math.floor(Math.random() * lados.length)];
    tabuleiro[escolha] = "⭕";
    return;
  }
}


function criarTabuleiroVisual() {

  const chat = document.getElementById("chat");

  const grade = document.createElement("div");
  grade.className = "tabuleiro";
  grade.id = "gradeVelha";

  for (let i = 0; i < 9; i++) {
    const btn = document.createElement("button");
    btn.className = "casa";
    btn.dataset.index = i;

    btn.onclick = function () {
      jogar(i);
    };

    grade.appendChild(btn);
  }

  chat.appendChild(grade);
  chat.scrollTop = chat.scrollHeight;
}

function jogar(pos) {

  if (!velhaAtiva) return;
  if (tabuleiro[pos] !== "") return;

  tabuleiro[pos] = "❌";
  atualizarTabuleiro();

  if (verificarVitoria("❌")) {
    velhaAtiva = false;
    digitarEEnviar("Você venceu.ㅤㅤEu quero uma revanche.", 600);
    desativarTabuleiro();
    return;
  }

  setTimeout(() => {
    jogadaIA();
    atualizarTabuleiro();

    if (verificarVitoria("⭕")) {
      velhaAtiva = false;
      digitarEEnviar("Eu venci.ㅤㅤVamos jogar denovo?.", 600);
      desativarTabuleiro();
      return;
    }

    if (!tabuleiro.includes("")) {
      velhaAtiva = false;
      digitarEEnviar("Empate. ㅤㅤ Eu te desafio.", 600);
      desativarTabuleiro();
    }

  }, 600);
}


function atualizarTabuleiro() {
  const botoes = document.querySelectorAll(".casa");

  botoes.forEach((btn, i) => {
    btn.textContent = tabuleiro[i];
    if (tabuleiro[i] !== "") {
      btn.disabled = true;
    }
  });
}


function desativarTabuleiro() {
  const botoes = document.querySelectorAll(".casa");
  botoes.forEach(btn => btn.disabled = true);
}


function removerTabuleiroAntigo() {
  const antigo = document.getElementById("gradeVelha");
  if (antigo) {
    antigo.remove();
  }
}

function mostrarFonte(texto){

  let chat = document.getElementById("chat");

  let div = document.createElement("div");
  div.className = "mensagem bot";

  div.innerText = texto;

  div.style.fontSize = "18px"; // 👈 maior só aqui
  div.style.fontWeight = "."; // opcional (fica bonito)

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

}

function abrirMenu(){

  let menu = document.getElementById("menuLateral");

  if(menu.style.display === "none"){
    menu.style.display = "flex";
  }else{
    menu.style.display = "none";
  }

}

document.addEventListener("click", function(e){

  let menu = document.getElementById("menuLateral");

  if(!menu.contains(e.target) && e.target.innerText !== "☰"){
    menu.style.display = "none";
  }

});

function fecharMenu(){
  document.getElementById("menuLateral").style.display = "none";
}

document.querySelectorAll("#menuLateral button").forEach(btn => {
  btn.addEventListener("click", fecharMenu);
});
